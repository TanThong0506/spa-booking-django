version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: spa_db
    restart: always
    environment:
      MYSQL_DATABASE: spa_booking_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: spa_web
    command: >
      bash -c "python manage.py migrate &&
               gunicorn --bind 0.0.0.0:8000 spa_booking.wsgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=spa_booking_db
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_HOST=db
      - DB_PORT=3306
      - DEBUG=False
    depends_on:
      - db

volumes:
  mysql_data:
