version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: spa_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-spa_booking_db}
      MYSQL_USER: ${DB_USER:-spa_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me-db-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root-password}
    ports:
      - "${DB_EXPOSE_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: spa_web
    command: >
      bash -c "python manage.py migrate &&
               gunicorn --bind 0.0.0.0:8000 spa_booking.wsgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
      DB_NAME: ${DB_NAME:-spa_booking_db}
      DB_USER: ${DB_USER:-spa_user}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-db-password}
      DB_HOST: db
      DB_PORT: 3306
      DEBUG: ${DEBUG:-False}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
