name: Spa Booking CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. Giai đoạn Lint: Kiểm tra lỗi trình bày code
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install flake8
        run: pip install flake8
      - name: Run Lint check
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # 2. Giai đoạn Test: Chạy các bài kiểm tra logic
  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      # Khởi tạo MySQL vì dự án dùng database này 
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: spa_booking_db
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Django Tests
        env:
          DB_NAME: spa_booking_db
          DB_USER: root
          DB_PASSWORD: ""
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
        run: |
          python manage.py test

  # 3. Giai đoạn Build: Kiểm tra khả năng đóng gói
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: Check Static Files
        run: python manage.py collectstatic --noinput