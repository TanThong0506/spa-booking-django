name: Spa Booking CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies for lint
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
      - name: Run Lint check
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Django Tests
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "True"
          DB_ENGINE: sqlite
        run: |
          python manage.py check
          python manage.py test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build Docker image
        run: docker build -t spa-booking:ci .
      - name: Production sanity check
        env:
          SECRET_KEY: ci-prod-secret-key-please-replace-with-long-random-value-123456789
          DEBUG: "False"
          ALLOWED_HOSTS: localhost
          DB_ENGINE: sqlite
        run: |
          python manage.py collectstatic --noinput
          python manage.py check --deploy