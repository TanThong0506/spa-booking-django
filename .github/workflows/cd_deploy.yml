name: Spa Booking CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        run: docker build -t spa-booking:${{ github.sha }} .

  deploy-production:
    name: Deploy To Production
    runs-on: ubuntu-latest
    needs: build-image
    environment:
      name: Production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Trigger deploy provider hook (optional)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo "Deploy hook triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL is not configured."
            echo "Deployment is still recorded in GitHub Environment history."
          fi

      - name: Deployment summary
        run: |
          echo "Deployed commit: $GITHUB_SHA"
          echo "Environment URL: ${{ vars.PRODUCTION_URL }}"
