name: Spa Booking CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        id: meta
        run: |
          echo "tags=spa-booking:${{ github.sha }}" >> $GITHUB_OUTPUT
          docker build -t spa-booking:${{ github.sha }} .

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-image
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
    environment:
      name: Production (Render)
      url: ${{ vars.PRODUCTION_RENDER_URL }}
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST \
            -H "Accept: application/json" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Render deployment triggered at $(date)"

  deploy-vps:
    name: Deploy to VPS via SSH
    runs-on: ubuntu-latest
    needs: build-image
    if: ${{ secrets.VPS_SSH_KEY != '' && secrets.VPS_HOST != '' }}
    environment:
      name: Production (VPS)
      url: ${{ vars.PRODUCTION_VPS_URL }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
        run: |
          # Install SSH key
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Add host key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Deploy
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "cd $VPS_APP_PATH && \
            git pull origin main && \
            docker compose -f docker-compose.prod.yml up -d --build"
          
          echo "✅ VPS deployment completed at $(date)"

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-image, deploy-render, deploy-vps]
    if: always()
    steps:
      - name: Summarize deployment
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy-render.result }}" = "success" ]; then
            echo "✅ Render deployment succeeded - ${{ vars.PRODUCTION_RENDER_URL }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy-render.result }}" = "skipped" ]; then
            echo "⏭️  Render deployment skipped (not configured)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Render deployment failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.deploy-vps.result }}" = "success" ]; then
            echo "✅ VPS deployment succeeded - ${{ vars.PRODUCTION_VPS_URL }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy-vps.result }}" = "skipped" ]; then
            echo "⏭️  VPS deployment skipped (not configured)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ VPS deployment failed" >> $GITHUB_STEP_SUMMARY
          fi
